events { worker_connections 1024; }

http {
    server {
        listen 443 ssl;
        server_name localhost;

        # Apuntamos a los certificados que acabas de crear
        ssl_certificate /etc/nginx/certs/proyecto.crt;
        ssl_certificate_key /etc/nginx/certs/proyecto.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            # Redirige el tráfico seguro al puerto de tu FastAPI
            proxy_pass http://host.docker.internal:21080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}